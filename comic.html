<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Seeking Forgiveness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: #07080c;
      color: #d6cfc4;
      font-family: 'IM Fell English', Georgia, serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 4rem 1.5rem;
    }

    #back {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      font-size: 0.75rem;
      color: #d6cfc4;
      text-decoration: none;
      letter-spacing: 0.06em;
      opacity: 0.5;
      z-index: 10;
      transition: opacity 0.3s;
    }

    #back:hover { opacity: 1; }

    #grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(calc(100vw - 3rem), 1400px);
      gap: 2.5rem;
      transition: gap 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #grid.reflowed {
      gap: 0.2rem;
    }

    .row {
      display: flex;
      width: 100%;
      gap: 0.2rem;
    }

    /* Row 2 hidden until act 2 */
    #row2 {
      max-height: 0;
      overflow: hidden;
      transition: max-height 1.2s ease;
    }

    #row2.open {
      max-height: 1000px;
    }

    /*
      Act 2 display order: 8, 7, 6, 5 (left to right).
      HTML source order is 5, 6, 7, 8 (the final correct order).
      CSS `order` reverses the display during act 2.
    */
    #row2 #p8 { order: 1; }
    #row2 #p7 { order: 2; }
    #row2 #p6 { order: 3; }
    #row2 #p5 { order: 4; }

    /* Reflow step 1: snap back to source order (5, 6, 7, 8) */
    #row2.reordered .panel { order: 0; }

    .panel {
      flex: 1 1 0;
      min-width: 0;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .panel.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <a href="index.html" id="back">&#8592; Rites of the Irreducible</a>

  <div id="grid">
    <div class="row" id="row1">
      <img class="panel" id="p1" src="panel%201.png" alt="">
      <img class="panel" id="p2" src="panel%202.png" alt="">
      <img class="panel" id="p3" src="panel%203.png" alt="">
      <img class="panel" id="p4" src="panel%204.png" alt="">
    </div>
    <!-- Source order 5–8 is the final correct left-to-right order.
         CSS `order` reverses them during act 2. -->
    <div class="row" id="row2">
      <img class="panel" id="p5" src="panel%205.png" alt="">
      <img class="panel" id="p6" src="panel%206.png" alt="">
      <img class="panel" id="p7" src="panel%207.png" alt="">
      <img class="panel" id="p8" src="panel%208.png" alt="">
    </div>
  </div>

  <script>
    var FADE      = 1200;            // ms — matches CSS transition
    var HOLD      = 5000;            // ms — pause while panel(s) are fully visible
    var STEP      = FADE + HOLD;     // 6200 ms between fade-starts
    var PAUSE_END = 3000;            // ms — hold all 8 before reflow

    // Act 2 fades in reverse: 8 → 7 → 6 → 5
    var ids = ['p1','p2','p3','p4','p8','p7','p6','p5'];

    ids.forEach(function (id, i) {
      // Open row 2 just before p8 (i===4) begins fading
      if (i === 4) {
        setTimeout(function () {
          document.getElementById('row2').classList.add('open');
        }, i * STEP - 400);
      }

      setTimeout(function () {
        document.getElementById(id).classList.add('visible');
      }, i * STEP);
    });

    // Reflow: two-step
    //   Step 1 — snap row 2 to correct order (5,6,7,8)
    //   Step 2 — close the row gap (600 ms later, so snap is visible first)
    var reorderAt = 7 * STEP + FADE + PAUSE_END;

    setTimeout(function () {
      document.getElementById('row2').classList.add('reordered');
    }, reorderAt);

    setTimeout(function () {
      document.getElementById('grid').classList.add('reflowed');
    }, reorderAt + 600);
  </script>

</body>
</html>
