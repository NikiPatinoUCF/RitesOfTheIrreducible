<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Seeking Forgiveness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: #07080c;
      color: #d6cfc4;
      font-family: 'IM Fell English', Georgia, serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    #title-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #07080c;
      z-index: 200;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #title-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .ts-num {
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0.18em;
      opacity: 0.45;
      margin-bottom: 1.2rem;
    }

    .ts-name {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-style: italic;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }

    .ts-hint {
      margin-top: 3rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      opacity: 0.3;
    }

    #comic-title {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-style: italic;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-align: center;
      margin-bottom: 1.2rem;
      opacity: 0.7;
    }

    #back {
      position: fixed;
      top: 1rem;
      left: 1.5rem;
      font-size: 0.75rem;
      color: #d6cfc4;
      text-decoration: none;
      letter-spacing: 0.06em;
      opacity: 0.5;
      z-index: 10;
      transition: opacity 0.3s;
    }

    #back:hover { opacity: 1; }

    #grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(calc(100vw - 3rem), 1400px);
      gap: 3rem;
      transition: gap 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #grid.v-merged {
      gap: 0;
    }

    .row {
      display: flex;
      width: 100%;
      gap: 1rem;
      transition: gap 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #grid.h-merged .row {
      gap: 0;
    }

    /* Row 2 hidden until act 2 */
    #row2 {
      max-height: 0;
      overflow: hidden;
      transition: max-height 1.2s ease;
    }

    #row2.open {
      max-height: 1000px;
    }

    .panel {
      flex: 1 1 0;
      min-width: 0;
      height: calc(50vh - 3.5rem);
      object-fit: contain;
      object-position: center;
      display: block;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .panel.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="title-screen">
    <p class="ts-num">I.</p>
    <h1 class="ts-name">The Seeking Forgiveness</h1>
    <p class="ts-hint">click to begin</p>
  </div>

  <a href="index.html" id="back">&#8592; Rites of the Irreducible</a>

  <h1 id="comic-title">The Seeking Forgiveness</h1>

  <div id="grid">
    <div class="row" id="row1">
      <img class="panel" id="p1" src="panel%201.png" alt="">
      <img class="panel" id="p2" src="panel%202.png" alt="">
      <img class="panel" id="p3" src="panel%203.png" alt="">
      <img class="panel" id="p4" src="panel%204.png" alt="">
    </div>
    <div class="row" id="row2">
      <img class="panel" id="p5" src="panel%205.png" alt="">
      <img class="panel" id="p6" src="panel%206.png" alt="">
      <img class="panel" id="p7" src="panel%207.png" alt="">
      <img class="panel" id="p8" src="panel%208.png" alt="">
    </div>
  </div>

  <script>
    var FADE      = 1200;
    var HOLD      = 5000;
    var STEP      = FADE + HOLD;
    var PAUSE_END = 3000;
    var ids = ['p1','p2','p3','p4','p5','p6','p7','p8'];

    function startSequence() {
      ids.forEach(function (id, i) {
        if (i === 4) {
          setTimeout(function () {
            document.getElementById('row2').classList.add('open');
          }, i * STEP - 400);
        }
        setTimeout(function () {
          document.getElementById(id).classList.add('visible');
        }, i * STEP);
      });
      var mergeAt = 7 * STEP + FADE + PAUSE_END;

      setTimeout(function () {
        document.getElementById('grid').classList.add('h-merged');
      }, mergeAt);

      // vertical fires after horizontal transition (1500ms) + brief pause (300ms)
      setTimeout(function () {
        document.getElementById('grid').classList.add('v-merged');
      }, mergeAt + 1800);
    }

    var ts = document.getElementById('title-screen');
    ts.addEventListener('click', function () {
      ts.classList.add('fade-out');
      setTimeout(function () { ts.remove(); }, 1100);
      startSequence();
    });
  </script>

</body>
</html>
