<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rites of the Irreducible</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #07080c;
      color: #d6cfc4;
      font-family: 'IM Fell English', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bang {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    main {
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    h1 {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-style: italic;
      font-weight: normal;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    ol {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    li {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-style: normal;
      letter-spacing: 0.04em;
    }

    .numeral {
      display: inline-block;
      width: 2.2em;
      text-align: right;
      margin-right: 0.6em;
      opacity: 0.5;
    }

    a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="bang"></canvas>
  <main>
    <h1>Rites of the Irreducible</h1>
    <ol>
      <li><span class="numeral">I.</span><a href="twine.html.html">The Index</a></li>
      <li><span class="numeral">II.</span><a href="fisher.html.html">The Casting Out</a></li>
      <li><span class="numeral">III.</span><a href="comic.html">The Seeking Forgiveness</a></li>
    </ol>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById('bang');
      const ctx = canvas.getContext('2d');
      const main = document.querySelector('main');

      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;

      // — Particles —
      const COUNT = 240;
      const particles = [];

      function Particle() {
        const angle = Math.random() * Math.PI * 2;
        // bias distribution toward higher speeds: more particles fly far
        const speed = Math.pow(Math.random(), 0.45) * 9 + 0.4;
        this.x  = cx;
        this.y  = cy;
        this.px = cx;
        this.py = cy;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        // warm white → amber variation
        this.r = 242 + Math.floor(Math.random() * 13);
        this.g = 220 + Math.floor(Math.random() * 28);
        this.b = 175 + Math.floor(Math.random() * 60);
        this.size  = 0.6 + Math.random() * 2.8;
        this.life  = 0.65 + Math.random() * 0.35;
        this.decay = 0.004 + Math.random() * 0.013;
      }

      Particle.prototype.step = function () {
        this.px = this.x;
        this.py = this.y;
        this.vy += 0.018; // slight gravity gives weight
        this.x  += this.vx;
        this.y  += this.vy;
        this.life -= this.decay;
      };

      Particle.prototype.draw = function () {
        const a = Math.max(0, this.life);
        ctx.strokeStyle = `rgba(${this.r},${this.g},${this.b},${a})`;
        ctx.lineWidth   = this.size * Math.sqrt(a);
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x,  this.y);
        ctx.stroke();
      };

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      // — Flash state —
      let flashAlpha = 1.0;
      const FLASH_DECAY = 0.048; // gone in ~21 frames (~0.35 s)

      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // radial bloom — the moment of impact
        if (flashAlpha > 0) {
          const r = Math.max(canvas.width, canvas.height) * 0.75;
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0,    `rgba(255,255,255,${flashAlpha})`);
          g.addColorStop(0.25, `rgba(255,245,220,${flashAlpha * 0.75})`);
          g.addColorStop(1,    `rgba(255,240,200,0)`);
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          flashAlpha -= FLASH_DECAY;
        }

        // update and draw particles
        let alive = false;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          if (p.life > 0) {
            alive = true;
            p.step();
            p.draw();
          }
        }

        if (!alive && flashAlpha <= 0) {
          // animation over — dissolve canvas, reveal content
          canvas.style.transition = 'opacity 0.9s ease';
          canvas.style.opacity    = '0';
          main.style.opacity      = '1';
          setTimeout(function () { canvas.remove(); }, 1000);
          return;
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }());
  </script>
</body>
</html>
